<script>
const LS = {
  session: 'kpi_session_skripsi',
  complaints: 'kpi_complaints_v3',   // versi baru → paksa reset data lama
  fte: 'kpi_fte_settings_v3',
};

// Kategori konsisten Bahasa Indonesia — sesuai Tabel 4.4 Skripsi
const categories = [
  'Plumbing/Air', 'Listrik/Token', 'Teknis Unit', 'Fasilitas Umum',
  'Kebersihan', 'Keamanan/Kejadian', 'Administrasi/Kartu Akses', 'Renovasi/Izin Pekerjaan'
];
const priorities = ['High', 'Medium', 'Low'];
const statuses  = ['Done', 'On Progress', 'Pending'];
const picMap    = {
  'Plumbing/Air':              'Teknisi',
  'Listrik/Token':             'Teknisi',
  'Teknis Unit':               'Teknisi',
  'Fasilitas Umum':            'Teknisi',
  'Kebersihan':                'Housekeeping',
  'Keamanan/Kejadian':         'Security',
  'Administrasi/Kartu Akses':  'Tenant Relation',
  'Renovasi/Izin Pekerjaan':   'Tenant Relation'
};

function uid() { return 'C-' + Math.random().toString(36).slice(2, 8).toUpperCase(); }
function fmt(n) { return new Intl.NumberFormat('id-ID').format(n); }
function pct(n) { return new Intl.NumberFormat('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Math.floor(n * 100) / 100) + '%'; }
function safeDate(v) { if (!v) return null; const d = new Date(v); return isNaN(d) ? null : d; }
function hoursDiff(a, b) { return (b - a) / 36e5; }

// ============================================================
// Sample data — sesuai data aktual Skripsi Vincent (Tabel 4.3, 4.10, 4.15)
// ============================================================
function sampleData() {
  const data = [];

  // Distribusi kasus per bulan — Tabel 4.3 Skripsi
  // [total, done, onProgress]  (Pending = 0 di semua bulan)
  const monthDist = [
    [16, 16, 0],  // Jan
    [15, 14, 1],  // Feb
    [15, 12, 3],  // Mar
    [14, 12, 2],  // Apr
    [14, 12, 2],  // Mei
    [16, 15, 1],  // Jun
    [16, 14, 2],  // Jul
    [15, 15, 0],  // Agu
    [24, 23, 1],  // Sep
    [20, 18, 2],  // Okt
    [28, 26, 2],  // Nov
    [18, 15, 3],  // Des
  ];

  // Kasus per kategori — Tabel 4.10 & 4.12 Skripsi
  // SLA violations: Plumbing/Air=16, Listrik/Token=2, Fasilitas Umum=1, semua lain=0
  // Waktu standar: Plumbing=2j, Listrik=1j, TekUnit=2j, FasUmum=1j, Kebersihan=0.5j, Keamanan=1j, Admin=0.5j, Renovasi=1j
  const catConfig = [
    { cat: 'Plumbing/Air',             pic: 'Teknisi',         priority: 'High',   count: 128, slaViolations: 16 },
    { cat: 'Listrik/Token',            pic: 'Teknisi',         priority: 'High',   count: 28,  slaViolations: 2  },
    { cat: 'Teknis Unit',              pic: 'Teknisi',         priority: 'Medium', count: 24,  slaViolations: 0  },
    { cat: 'Fasilitas Umum',           pic: 'Teknisi',         priority: 'Medium', count: 23,  slaViolations: 1  },
    { cat: 'Kebersihan',               pic: 'Housekeeping',    priority: 'Low',    count: 2,   slaViolations: 0  },
    { cat: 'Keamanan/Kejadian',        pic: 'Security',        priority: 'High',   count: 1,   slaViolations: 0  },
    { cat: 'Administrasi/Kartu Akses', pic: 'Tenant Relation', priority: 'Low',    count: 4,   slaViolations: 0  },
    { cat: 'Renovasi/Izin Pekerjaan',  pic: 'Tenant Relation', priority: 'Medium', count: 1,   slaViolations: 0  },
  ];

  // Buat pool kasus: setiap kasus punya bulan, status, dan flag SLA violation
  // Langkah 1: bangun slot per bulan sesuai Tabel 4.3
  const monthSlots = monthDist.map(([total, done, onp]) => {
    const slots = [];
    for (let d = 0; d < done; d++) slots.push('Done');
    for (let o = 0; o < onp; o++) slots.push('On Progress');
    return slots;
  });

  // Langkah 2: assign kasus per kategori ke bulan secara merata
  // KUNCI: kasus SLA violation = kasus On Progress (keduanya 19, sesuai Tabel 4.3 & 4.10 skripsi)
  // Kasus Done = sesuai SLA waktu; Kasus On Progress = tidak sesuai SLA (belum selesai)
  let globalIdx = 0;
  // Pool On Progress slots: dikumpulkan dulu dari monthSlots, lalu diisi ke violation cases
  const allOnProgressSlots = [];
  monthSlots.forEach((slots, mi) => {
    slots.forEach(s => { if (s === 'On Progress') allOnProgressSlots.push(mi); });
  });
  // Rebuild clean Done slots per month (hapus On Progress dari slot)
  const cleanDoneSlots = monthDist.map(([total, done]) => {
    const arr = [];
    for (let d = 0; d < done; d++) arr.push('Done');
    return arr;
  });

  let onpIdx = 0; // pointer ke pool On Progress

  catConfig.forEach(({ cat, pic, priority, count, slaViolations }) => {
    // Violation cases = yang On Progress (tersebar merata di tengah-tengah setiap kategori)
    const violationIndices = new Set();
    if (slaViolations > 0) {
      const step = Math.floor(count / (slaViolations + 1));
      for (let v = 0; v < slaViolations; v++) {
        violationIndices.add(Math.min(step * (v + 1), count - slaViolations + v));
      }
    }

    for (let i = 0; i < count; i++) {
      const isSLAViolation = violationIndices.has(i);

      // Bulan: violation cases pakai bulan dari pool On Progress, sisanya dari Done slots
      let mi;
      if (isSLAViolation && onpIdx < allOnProgressSlots.length) {
        mi = allOnProgressSlots[onpIdx++];
      } else {
        // Cari bulan yang masih punya slot Done
        let found = false;
        for (let m = 0; m < 12; m++) {
          const mIdx = (globalIdx + m) % 12;
          if (cleanDoneSlots[mIdx].length > 0) {
            cleanDoneSlots[mIdx].shift();
            mi = mIdx;
            found = true;
            break;
          }
        }
        if (!found) mi = globalIdx % 12;
      }

      const day = String(((globalIdx * 3) % 25) + 1).padStart(2, '0');
      const hr  = String(8 + (globalIdx % 10)).padStart(2, '0');
      const mn  = String((globalIdx * 13) % 60).padStart(2, '0');
      const inD = `2025-${String(mi + 1).padStart(2, '0')}-${day}T${hr}:${mn}:00`;

      // Status: violation = On Progress (belum selesai = tidak sesuai SLA)
      //         non-violation = Done (selesai tepat waktu = sesuai SLA)
      const status = isSLAViolation ? 'On Progress' : 'Done';

      // Response time: sesuai SLA kecuali violation
      let respMins, resHours;
      if (isSLAViolation) {
        // Violation: response melebihi target (sudah terlambat, masih On Progress)
        respMins = priority === 'High' ? 25 * 60 + 15   // >24j, jelas violation
                 : priority === 'Medium' ? 75            // >1j
                 : 150;                                  // >2j
        resHours = priority === 'High' ? 30 + (i % 10)  // >24j
                 : priority === 'Medium' ? 80 + (i % 10): 130 + (i % 10);
      } else {
        // Sesuai SLA: dalam target waktu
        respMins = priority === 'High' ? 14 + (i % 3)   // ~0.25j (<0.5j)
                 : priority === 'Medium' ? 30 + (i % 2) // ~0.5j (<1j)
                 : 60 + (i % 2);                         // ~1j (<2j)
        resHours = priority === 'High' ? 4 + (i % 5)    // 4-8j (<24j)
                 : priority === 'Medium' ? 6 + (i % 3)  // 6-8j (<72j)
                 : 5 + (i % 2);                          // 5-6j (<120j)
      }

      const resp = new Date(new Date(inD).getTime() + respMins * 60000);
      const done = new Date(new Date(inD).getTime() + resHours * 3600000);

      data.push({
        id:        uid(),
        entered:   inD,
        responded: resp.toISOString(),
        completed: status === 'Done' ? done.toISOString() : '',
        category:  cat,
        priority,
        status,
        pic
      });
      globalIdx++;
    }
  });

  // Acak urutan agar tidak monoton di tabel
  for (let i = data.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [data[i], data[j]] = [data[j], data[i]];
  }

  return data;
}

function loadState() {
  let c = JSON.parse(localStorage.getItem(LS.complaints) || 'null');
  if (!Array.isArray(c) || !c.length) {
    c = sampleData();
    localStorage.setItem(LS.complaints, JSON.stringify(c));
  }
  let fte = JSON.parse(localStorage.getItem(LS.fte) || 'null');
  if (!fte) {
    // Sumber: Template_FTE_Subbab_4_7_Menara_Swasana.xlsx
    fte = { standardTime: 1.71, effectiveHours: 2592, currentWorkforce: 32 };
    localStorage.setItem(LS.fte, JSON.stringify(fte));
  }

  // Per-division FTE config (jam kerja, hari, allowance)
  // Sesuai data Template_FTE_Menara_Swasana.xlsx
  let divConfig = JSON.parse(localStorage.getItem('kpi_div_config_v1') || 'null');
  if (!divConfig) {
    // Jam kerja efektif: (hari kerja/th * jam/hari) * (1 - allowance)
    // Teknisi:         250 hari * 8j * 0.9 allowance = 1800j → efektif ~2121.6j (skripsi)
    // Tenant Relation: 260 hari * 8j * 0.9 allowance → efektif ~2527.2j (skripsi)
    // Housekeeping:    260 hari * 7j * 0.9 allowance → efektif ~1996.8j (skripsi)
    // Security:        365 hari * 8j * 0.8 allowance (shift) → efektif ~3723j (skripsi) (termasuk lembur)
    divConfig = {
      'Teknisi':         { hariKerja: 250, jamPerHari: 8,  allowance: 0.10, aktual: 5,  efektif: 2121.6, },
      'Tenant Relation': { hariKerja: 260, jamPerHari: 8,  allowance: 0.10, aktual: 2,  efektif: 2527.2, },
      'Housekeeping':    { hariKerja: 260, jamPerHari: 7,  allowance: 0.10, aktual: 12, efektif: 1996.8, },
      'Security':        { hariKerja: 365, jamPerHari: 8,  allowance: 0.20, aktual: 13, efektif: 3723.0, },
    };
    localStorage.setItem('kpi_div_config_v1', JSON.stringify(divConfig));
  }

  // Survey scores (editable by user, affects KPI)
  let surveyScores = JSON.parse(localStorage.getItem('kpi_survey_v1') || 'null');
  if (!surveyScores) {
    surveyScores = { kepuasan: 3.42, kejelasan: 3.28, pelatihan: 2 };
    localStorage.setItem('kpi_survey_v1', JSON.stringify(surveyScores));
  }

  return { complaints: c, fte, divConfig, surveyScores };
}

let state = loadState();
let ui    = { page: 'dashboard', q: '', filter: 'all', sort: 'entered_desc', modal: null, confirmModal: null, importModal: null, mobileMenuOpen: false };
let charts = {};

function persist() {
  localStorage.setItem(LS.complaints, JSON.stringify(state.complaints));
  localStorage.setItem(LS.fte, JSON.stringify(state.fte));
  if (state.divConfig) localStorage.setItem('kpi_div_config_v1', JSON.stringify(state.divConfig));
  if (state.surveyScores) localStorage.setItem('kpi_survey_v1', JSON.stringify(state.surveyScores));
  render();
}
function sessionUser() { return JSON.parse(localStorage.getItem(LS.session) || 'null'); }

// ============================================================
// Metrics & SLA — kalkulasi diperbaiki
// ============================================================
function metrics() {
  const all  = state.complaints;
  const total   = all.length;
  const done    = all.filter(x => x.status === 'Done').length;
  const onp     = all.filter(x => x.status === 'On Progress').length;
  const pending = all.filter(x => x.status === 'Pending').length;
  const open    = all.filter(x => x.status === 'Open').length;

  const workload     = total * state.fte.standardTime;
  const currentStaff = state.fte.currentWorkforce || 15;
  const fte          = state.fte.effectiveHours > 0 ? workload / state.fte.effectiveHours : 0;
  const fteGap       = fte - currentStaff;
  const rec          = fteGap > 0 ? Math.ceil(fteGap) : 0;
  const utilization  = currentStaff > 0 ? (fte / currentStaff) * 100 : 0;
  const kpi          = total > 0 ? (done / total) * 100 : 0;
  return { total, done, onp, pending, open, kpi, workload, fte, rec, currentStaff, fteGap, utilization };
}

function calcSLA() {
  const rows = state.complaints.map(x => {
    const enter = safeDate(x.entered);
    const resp  = safeDate(x.responded);
    const comp  = safeDate(x.completed);

    const rt  = (resp  && enter) ? hoursDiff(enter, resp)  : null;
    const res = (comp  && enter) ? hoursDiff(enter, comp)  : null;

    const limit = x.priority === 'High'
      ? { r: 0.5, s: 24  }
      : x.priority === 'Medium'
        ? { r: 1,   s: 72  }
        : { r: 2,   s: 120 };

    // Response OK: hanya jika ada waktu respon
    const okResponse   = rt  != null && rt  <= limit.r;
    // Resolution OK: hanya jika ada waktu selesai
    const okResolution = res != null && res <= limit.s;
    // Kepatuhan penuh: KEDUA harus terpenuhi
    const ok = okResponse && okResolution;

    return { ...x, rt, res, ok, okResponse, okResolution };
  });

  const calc      = rows.filter(x => x.rt != null || x.res != null);
  const comp      = rows.filter(x => x.ok).length;
  const rtRows    = rows.filter(x => x.rt  != null);
  const resRows   = rows.filter(x => x.res != null);
  const avgRt     = rtRows.length  ? rtRows.reduce((a, b) => a + b.rt,  0) / rtRows.length  : 0;
  const avgRes    = resRows.length ? resRows.reduce((a, b) => a + b.res, 0) / resRows.length : 0;
  const totalCalc = rows.length;

  return {
    rows,
    averageResponse:   avgRt,
    averageResolution: avgRes,
    compliance: totalCalc > 0 ? (comp / totalCalc) * 100 : 0,
    compliant: comp,
    non: totalCalc - comp
  };
}

// SLA per kuartal (untuk chart tren)
function calcSLAByQuarter() {
  const quarters = [
    state.complaints.filter(x => { const m = new Date(x.entered).getMonth(); return m < 3; }),
    state.complaints.filter(x => { const m = new Date(x.entered).getMonth(); return m >= 3 && m < 6; }),
    state.complaints.filter(x => { const m = new Date(x.entered).getMonth(); return m >= 6 && m < 9; }),
    state.complaints.filter(x => { const m = new Date(x.entered).getMonth(); return m >= 9; }),
  ];

  return quarters.map(qRows => {
    if (!qRows.length) return 0;
    const comp = qRows.filter(x => {
      const enter = safeDate(x.entered);
      const resp  = safeDate(x.responded);
      const done  = safeDate(x.completed);
      if (!enter) return false;
      const rt  = resp ? hoursDiff(enter, resp) : null;
      const res = done ? hoursDiff(enter, done) : null;
      const limit = x.priority === 'High' ? { r: 0.5, s: 24 } : x.priority === 'Medium' ? { r: 1, s: 72 } : { r: 2, s: 120 };
      return (rt != null && rt <= limit.r) && (res != null && res <= limit.s);
    }).length;
    return parseFloat(((comp / qRows.length) * 100).toFixed(2));
  });
}

function filtered() {
  let arr = [...state.complaints];
  const q = ui.q.toLowerCase().trim();
  if (q) arr = arr.filter(x =>
    x.id.toLowerCase().includes(q) ||
    x.category.toLowerCase().includes(q) ||
    x.pic.toLowerCase().includes(q) ||
    x.priority.toLowerCase().includes(q) ||
    x.status.toLowerCase().includes(q)
  );
  if (ui.filter !== 'all') arr = arr.filter(x => x.status === ui.filter);
  if (ui.sort === 'entered_desc') arr.sort((a, b) => new Date(b.entered) - new Date(a.entered));
  else if (ui.sort === 'entered_asc') arr.sort((a, b) => new Date(a.entered) - new Date(b.entered));
  return arr;
}

function badgeStatus(s) {
  if (s === 'Done')        return 'border border-iris  text-iris  bg-transparent whitespace-nowrap';
  if (s === 'On Progress') return 'border border-carbon text-carbon bg-transparent whitespace-nowrap';
  if (s === 'Pending')     return 'border border-smoke  text-smoke  bg-transparent whitespace-nowrap';
  return 'border border-ash text-ash bg-transparent whitespace-nowrap';
}

// ============================================================
// PDF Print — buka window baru dengan HTML bersih, lalu print
// ============================================================
function buildPrintHTML(type) {
  const m  = metrics();
  const s  = calcSLA();
  const now = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

  const typeLabels = { kpi: 'KPI Performance', sla: 'SLA Performance', fte: 'FTE Workload' };
  const label = typeLabels[type] || 'Eksekutif';

  // --- KPI section --- menggunakan surveyScores dari state
  const sv = state.surveyScores || { kepuasan: null, kejelasan: null, pelatihan: null };
  const svKepuasan  = sv.kepuasan  != null ? sv.kepuasan.toFixed(2)  : '—';
  const svKejelasan = sv.kejelasan != null ? sv.kejelasan.toFixed(2) : '—';
  const svPelatihan = sv.pelatihan != null ? sv.pelatihan            : '—';
  const svKepuasanOk  = sv.kepuasan  != null && sv.kepuasan  >= 3.0;
  const svKejelasanOk = sv.kejelasan != null && sv.kejelasan >= 3.0;

  const kpiRows = [
    ['Pelanggan', 'Tingkat Kepuasan Penghuni',       `Skor Survey: ${svKepuasan}/4`,   '≥ 3,00', svKepuasanOk  || sv.kepuasan  == null],
    ['Pelanggan', 'Kejelasan Informasi Status Komplain', `Skor Survey: ${svKejelasan}/4`, '≥ 3,00', svKejelasanOk || sv.kejelasan == null],
    ['Pelanggan', 'Kecepatan Follow-up Komplain',    `${s.averageResponse.toFixed(2)} jam rata-rata`, '< 0.5 jam', s.averageResponse <= 0.5],
    ['Proses Bisnis Internal', 'Rata-rata Response Time',    `${s.averageResponse.toFixed(2)} jam`, 'H<0.5j / M<1j / L<2j', s.averageResponse <= 2],
    ['Proses Bisnis Internal', 'Rata-rata Resolution Time',  `${s.averageResolution.toFixed(2)} jam`, 'H<24j / M<72j / L<120j', s.averageResolution <= 120],
    ['Proses Bisnis Internal', 'Kepatuhan SLA Total',        `${pct(s.compliance)}`, '> 90%', s.compliance >= 90],
    ['Proses Bisnis Internal', 'Tingkat Penyelesaian Kasus', `${pct(m.kpi)}`, '> 85%', m.kpi >= 85],
    ['Keuangan',  'Utilisasi FTE',   `${m.utilization.toFixed(1)}%`, '80–100%', m.utilization >= 80 && m.utilization <= 100],
    ['Pembelajaran & Pertumbuhan', 'Kapasitas Workforce', `FTE ${m.fte.toFixed(4)} ≤ ${m.currentStaff} staf aktual`, 'FTE ≤ Staf Aktual', m.fte <= m.currentStaff],
    ['Pembelajaran & Pertumbuhan', 'Kebutuhan Pelatihan Petugas', `${svPelatihan} kegiatan teridentifikasi`, 'Evaluasi berkala', true],
  ];

  // Catatan tidak sesuai (untuk PDF notes)
  const notSesuai = [];
  if (sv.kepuasan  != null && sv.kepuasan  < 3.0)  notSesuai.push(`Kepuasan penghuni (${svKepuasan}) belum mencapai target ≥ 3,00`);
  if (sv.kejelasan != null && sv.kejelasan < 3.0)  notSesuai.push(`Kejelasan informasi (${svKejelasan}) belum mencapai target ≥ 3,00`);
  if (s.averageResponse > 0.5)   notSesuai.push(`Avg. Response Time (${s.averageResponse.toFixed(2)} jam) melewati target < 0.5 jam`);
  if (s.compliance < 90)         notSesuai.push(`Kepatuhan SLA (${pct(s.compliance)}) belum mencapai target > 90%`);
  if (m.kpi < 85)                notSesuai.push(`Tingkat penyelesaian kasus (${pct(m.kpi)}) belum mencapai target > 85%`);
  if (m.utilization < 80 || m.utilization > 100) notSesuai.push(`Utilisasi FTE (${m.utilization.toFixed(1)}%) di luar rentang optimal 80–100%`);
  if (m.fte > m.currentStaff)    notSesuai.push(`FTE (${m.fte.toFixed(4)}) melebihi staf aktual (${m.currentStaff} orang) — terjadi defisit tenaga kerja`);

  // --- Kategori breakdown ---
  const catRows = categories.map(cat => {
    const total = state.complaints.filter(x => x.category.trim() === cat).length;
    const done  = state.complaints.filter(x => x.category.trim() === cat && x.status === 'Done').length;
    const pctD  = total > 0 ? new Intl.NumberFormat('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Math.floor((done/total)*10000)/100) + '%' : '-';
    return `<tr><td>${cat}</td><td style="text-align:center">${total}</td><td style="text-align:center">${done}</td><td style="text-align:center">${pctD}</td></tr>`;
  }).join('');

  // --- SLA per PIC ---
  const picRows = ['Teknisi', 'Housekeeping', 'Security', 'Tenant Relation'].map(p => {
    const cnt  = state.complaints.filter(x => x.pic.trim() === p).length;
    const done = state.complaints.filter(x => x.pic.trim() === p && x.status === 'Done').length;
    const comp = s.rows.filter(x => x.pic.trim() === p && x.ok).length;
    const pctC = cnt > 0 ? new Intl.NumberFormat('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Math.floor((comp/cnt)*10000)/100) + '%' : '-';
    return `<tr><td>${p}</td><td style="text-align:center">${cnt}</td><td style="text-align:center">${done}</td><td style="text-align:center">${pctC}</td></tr>`;
  }).join('');

  // --- FTE per PIC — sesuai data Template_FTE_Subbab_4_7_Menara_Swasana.xlsx ---
  // Teknisi: beban 355 jam, efektif 2121.6 jam/orang, aktual 5 orang
  // Tenant Relation: beban 3 jam, efektif 2527.2 jam/orang, aktual 2 orang
  // Housekeeping: beban 1 jam, efektif 1996.8 jam/orang, aktual 12 orang
  // Security: beban 1 jam, efektif 3723 jam/orang, aktual 13 orang
  const catStdMap = { 'Plumbing/Air':2,'Listrik/Token':1,'Teknis Unit':2,'Fasilitas Umum':1,'Kebersihan':0.5,'Keamanan/Kejadian':1,'Administrasi/Kartu Akses':0.5,'Renovasi/Izin Pekerjaan':1 };
  function divBeban(div) {
    return state.complaints.filter(x=>x.pic.trim()===div).reduce((s,k)=>s+(catStdMap[k.category]||state.fte.standardTime),0);
  }
  const dc = state.divConfig || {};
  const fteDetail = {
    'Teknisi':         { beban: divBeban('Teknisi'),         efektif: (dc['Teknisi']?.efektif||2121.6),         aktual: (dc['Teknisi']?.aktual||5)  },
    'Tenant Relation': { beban: divBeban('Tenant Relation'), efektif: (dc['Tenant Relation']?.efektif||2527.2),  aktual: (dc['Tenant Relation']?.aktual||2)  },
    'Housekeeping':    { beban: divBeban('Housekeeping'),    efektif: (dc['Housekeeping']?.efektif||1996.8),     aktual: (dc['Housekeeping']?.aktual||12) },
    'Security':        { beban: divBeban('Security'),        efektif: (dc['Security']?.efektif||3723),           aktual: (dc['Security']?.aktual||13) },
  };
  const fteRows = ['Teknisi', 'Tenant Relation', 'Housekeeping', 'Security'].map(p => {
    const d = fteDetail[p];
    const ftePIC = d.efektif > 0 ? (d.beban / d.efektif).toFixed(4) : '0.0000';
    const efektif = parseFloat(ftePIC) <= d.aktual;
    return `<tr><td>${p}</td><td style="text-align:center">${state.complaints.filter(x => x.pic.trim() === p).length}</td><td style="text-align:center">${d.beban.toFixed(1)}</td><td style="text-align:center">${ftePIC}</td><td style="text-align:center;color:${efektif?'#166534':'#991b1b'};font-weight:700;">${efektif?'✓':'✗'}</td></tr>`;
  }).join('');

  const sharedStyle = `
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Arial, sans-serif; font-size: 12px; color: #111; background: #fff; padding: 32px; }
      h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
      h2 { font-size: 14px; font-weight: 700; margin: 24px 0 8px; text-transform: uppercase; letter-spacing: 0.06em; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
      .subtitle { font-size: 11px; color: #555; margin-bottom: 2px; }
      .date { font-size: 10px; color: #777; }
      .header { text-align: center; border-bottom: 2px solid #111; padding-bottom: 16px; margin-bottom: 24px; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 24px; }
      .metric-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 12px; }
      .metric-row .lbl { color: #555; }
      .metric-row .val { font-weight: 700; color: #111; }
      table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 11px; }
      th { background: #f0f0f0; border: 1px solid #bbb; padding: 6px 8px; text-align: left; font-weight: 700; font-size: 10px; text-transform: uppercase; }
      td { border: 1px solid #ddd; padding: 5px 8px; }
      tr:nth-child(even) td { background: #fafafa; }
      .note { border: 1px solid #ccc; border-radius: 4px; padding: 12px 16px; font-size: 11px; color: #444; line-height: 1.7; margin-top: 16px; background: #f9f9f9; }
      .footer { margin-top: 32px; border-top: 1px solid #ccc; padding-top: 10px; font-size: 10px; color: #888; display: flex; justify-content: space-between; }
      @page { size: A4; margin: 15mm; }
      @media print { body { padding: 0; } }
    </style>
  `;

  let body = '';

  if (type === 'kpi') {
    body = `
      <div class="header">
        <h1>LAPORAN KPI PERFORMANCE — MENARA SWASANA</h1>
        <div class="subtitle">Balanced Scorecard — Sistem Manajemen Komplain Apartemen</div>
        <div class="date">Tanggal Laporan: ${now}</div>
      </div>

      <h2>Ringkasan Metrik Utama</h2>
      <div class="grid2">
        <div>
          <div class="metric-row"><span class="lbl">Total Kasus Terdaftar</span><span class="val">${m.total} kasus</span></div>
          <div class="metric-row"><span class="lbl">Kasus Selesai (Done)</span><span class="val">${m.done} kasus</span></div>
          <div class="metric-row"><span class="lbl">Tingkat Penyelesaian</span><span class="val">${pct(m.kpi)}</span></div>
          <div class="metric-row"><span class="lbl">On Progress</span><span class="val">${m.onp} kasus</span></div>
          <div class="metric-row"><span class="lbl">Pending</span><span class="val">${m.pending} kasus</span></div>
        </div>
        <div>
          <div class="metric-row"><span class="lbl">Kepatuhan SLA</span><span class="val">${pct(s.compliance)}</span></div>
          <div class="metric-row"><span class="lbl">Avg. Response Time</span><span class="val">${s.averageResponse.toFixed(2)} jam</span></div>
          <div class="metric-row"><span class="lbl">Avg. Resolution Time</span><span class="val">${s.averageResolution.toFixed(2)} jam</span></div>
          <div class="metric-row"><span class="lbl">FTE Index</span><span class="val">${m.fte.toFixed(2)}</span></div>
          <div class="metric-row"><span class="lbl">Utilisasi Workforce</span><span class="val">${m.utilization.toFixed(1)}%</span></div>
        </div>
      </div>

      <h2>KPI Balanced Scorecard</h2>
      <table>
        <thead><tr><th>Perspektif</th><th>Indikator KPI</th><th>Nilai Aktual</th><th>Target</th><th>Status</th></tr></thead>
        <tbody>
          ${kpiRows.map(([p,k,v,t,ok]) => `<tr><td>${p}</td><td>${k}</td><td>${v}</td><td>${t}</td><td style="color:${ok===false?'#991b1b':'#166534'};font-weight:700;">${ok===false?'✗ Belum':'✓ Tercapai'}</td></tr>`).join('')}
        </tbody>
      </table>

      <h2>Distribusi Komplain per Kategori</h2>
      <table>
        <thead><tr><th>Kategori</th><th style="text-align:center">Total</th><th style="text-align:center">Selesai</th><th style="text-align:center">% Selesai</th></tr></thead>
        <tbody>${catRows}</tbody>
      </table>

      <div class="note">
        <strong>Catatan Evaluasi:</strong> Total komplain terdaftar sebanyak <strong>${m.total} kasus</strong> dengan tingkat penyelesaian <strong>${pct(m.kpi)}</strong>. 
        Kepatuhan SLA tercatat <strong>${pct(s.compliance)}</strong>. 
        ${m.rec > 0 ? `Disarankan penambahan <strong>${m.rec} staf</strong> untuk mencukupi kebutuhan operasional (utilisasi ${m.utilization.toFixed(1)}%).` : `Kapasitas workforce dinilai memadai (utilisasi ${m.utilization.toFixed(1)}%).`}
        ${notSesuai.length > 0 ? `<br><br><strong style="color:#991b1b;">⚠ Indikator yang Belum Sesuai Target:</strong><ul style="margin-top:6px;padding-left:18px;">${notSesuai.map(n => `<li style="color:#991b1b;margin-bottom:3px;">${n}</li>`).join('')}</ul>` : '<br><br><strong style="color:#166534;">✓ Semua indikator KPI telah mencapai target.</strong>'}
      </div>
    `;

  } else if (type === 'sla') {
    const qSLA = calcSLAByQuarter();
    body = `
      <div class="header">
        <h1>LAPORAN SLA PERFORMANCE — MENARA SWASANA</h1>
        <div class="subtitle">Analisis Service Level Agreement — Sistem Manajemen Komplain</div>
        <div class="date">Tanggal Laporan: ${now}</div>
      </div>

      <h2>Ringkasan SLA</h2>
      <div class="grid2">
        <div>
          <div class="metric-row"><span class="lbl">Total Kasus</span><span class="val">${state.complaints.length}</span></div>
          <div class="metric-row"><span class="lbl">Kasus Patuh SLA</span><span class="val">${s.compliant}</span></div>
          <div class="metric-row"><span class="lbl">Kasus Melanggar SLA</span><span class="val">${s.non}</span></div>
          <div class="metric-row"><span class="lbl">Kepatuhan SLA Total</span><span class="val">${pct(s.compliance)}</span></div>
        </div>
        <div>
          <div class="metric-row"><span class="lbl">Avg. Response Time</span><span class="val">${s.averageResponse.toFixed(2)} jam</span></div>
          <div class="metric-row"><span class="lbl">Target Response (High)</span><span class="val">&lt; 0.5 jam</span></div>
          <div class="metric-row"><span class="lbl">Avg. Resolution Time</span><span class="val">${s.averageResolution.toFixed(2)} jam</span></div>
          <div class="metric-row"><span class="lbl">Target Resolution (High)</span><span class="val">&lt; 24 jam</span></div>
        </div>
      </div>

      <h2>SLA Target per Tingkat Prioritas</h2>
      <table>
        <thead><tr><th>Prioritas</th><th>Target Response</th><th>Target Resolution</th><th>Keterangan</th></tr></thead>
        <tbody>
          <tr><td>High</td><td>&lt; 30 menit (0.5 jam)</td><td>&lt; 24 jam</td><td>Kerusakan kritis / darurat</td></tr>
          <tr><td>Medium</td><td>&lt; 1 jam</td><td>&lt; 72 jam</td><td>Gangguan signifikan</td></tr>
          <tr><td>Low</td><td>&lt; 2 jam</td><td>&lt; 120 jam</td><td>Permintaan umum</td></tr>
        </tbody>
      </table>

      <h2>Kepatuhan SLA per Kuartal</h2>
      <table>
        <thead><tr><th>Kuartal</th><th style="text-align:center">Kepatuhan SLA</th><th style="text-align:center">Target</th><th>Status</th></tr></thead>
        <tbody>
          ${['Q1 (Jan–Mar)','Q2 (Apr–Jun)','Q3 (Jul–Sep)','Q4 (Okt–Des)'].map((q, i) => {
            const v = qSLA[i];
            const ok = v >= 90;
            return `<tr><td>${q}</td><td style="text-align:center">${new Intl.NumberFormat('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Math.floor(v*100)/100)}%</td><td style="text-align:center">&gt; 90%</td><td style="color:${ok?'#166534':'#991b1b'}">${ok ? '✓ Tercapai' : '✗ Belum Tercapai'}</td></tr>`;
          }).join('')}
        </tbody>
      </table>

      <h2>Kepatuhan SLA per Divisi PIC</h2>
      <table>
        <thead><tr><th>PIC / Divisi</th><th style="text-align:center">Total Kasus</th><th style="text-align:center">Selesai</th><th style="text-align:center">% Patuh SLA</th></tr></thead>
        <tbody>${picRows}</tbody>
      </table>

      <div class="note">
        <strong>Catatan Evaluasi:</strong> Rata-rata waktu respon sebesar <strong>${s.averageResponse.toFixed(2)} jam</strong> dan rata-rata waktu penyelesaian <strong>${s.averageResolution.toFixed(2)} jam</strong>. 
        Kepatuhan SLA total tercatat <strong>${pct(s.compliance)}</strong> (target &gt; 90%).
        ${s.compliance >= 90 ? 'Performa SLA memenuhi target.' : '<br><br><strong style="color:#991b1b;">⚠ SLA TIDAK SESUAI TARGET:</strong> Kepatuhan SLA ' + pct(s.compliance) + ' belum mencapai batas minimum 90%. Diperlukan peningkatan kecepatan penanganan dan respons awal.'}
        ${s.averageResponse > 0.5 ? '<br><span style="color:#991b1b;">• Avg. Response Time (' + s.averageResponse.toFixed(2) + ' jam) melebihi batas 0,5 jam untuk prioritas High.</span>' : ''}
        ${s.non > 0 ? '<br><span style="color:#991b1b;">• Terdapat ' + s.non + ' kasus yang melanggar SLA dan memerlukan tindak lanjut.</span>' : ''}
      </div>
    `;

  } else if (type === 'fte') {
    body = `
      <div class="header">
        <h1>LAPORAN FTE WORKLOAD — MENARA SWASANA</h1>
        <div class="subtitle">Analisis Kapasitas Tenaga Kerja (Full Time Equivalent)</div>
        <div class="date">Tanggal Laporan: ${now}</div>
      </div>

      <h2>Parameter & Hasil Kalkulasi FTE</h2>
      <div class="grid2">
        <div>
          <div class="metric-row"><span class="lbl">Total Komplain (beban)</span><span class="val">${m.total} kasus</span></div>
          <div class="metric-row"><span class="lbl">Standard Handling Time</span><span class="val">${state.fte.standardTime} jam/kasus</span></div>
          <div class="metric-row"><span class="lbl">Total Jam Kerja Terhitung</span><span class="val">${m.workload.toFixed(1)} jam</span></div>
          <div class="metric-row"><span class="lbl">Jam Kerja Efektif / Staf</span><span class="val">${state.fte.effectiveHours} jam/periode</span></div>
        </div>
        <div>
          <div class="metric-row"><span class="lbl">FTE Index (Kebutuhan Ideal)</span><span class="val">${m.fte.toFixed(2)}</span></div>
          <div class="metric-row"><span class="lbl">Staf Aktual Saat Ini</span><span class="val">${m.currentStaff} orang</span></div>
          <div class="metric-row"><span class="lbl">Gap FTE</span><span class="val">${m.fteGap > 0 ? '+' : ''}${m.fteGap.toFixed(2)} (${m.fteGap > 0 ? 'defisit' : 'surplus'})</span></div>
          <div class="metric-row"><span class="lbl">Utilisasi Workforce</span><span class="val">${m.utilization.toFixed(1)}% (${m.utilization > 100 ? 'OVERLOAD' : m.utilization < 80 ? 'UNDERLOAD' : 'OPTIMAL'})</span></div>
        </div>
      </div>

      <h2>Formula Kalkulasi FTE</h2>
      <table>
        <thead><tr><th>Komponen</th><th>Nilai</th><th>Keterangan</th></tr></thead>
        <tbody>
          <tr><td>Total Beban Kerja</td><td>${m.total} kasus × ${state.fte.standardTime} jam</td><td>= ${m.workload.toFixed(1)} jam total</td></tr>
          <tr><td>Jam Kerja Efektif per Staf</td><td>${state.fte.effectiveHours} jam</td><td>Per periode (semua divisi)</td></tr>
          <tr><td>FTE Kebutuhan</td><td>${m.workload.toFixed(1)} ÷ ${state.fte.effectiveHours}</td><td>= ${m.fte.toFixed(2)} FTE</td></tr>
          <tr><td>Gap / Kelebihan</td><td>${m.fte.toFixed(2)} − ${m.currentStaff}</td><td>= ${m.fteGap.toFixed(2)} ${m.fteGap > 0 ? '(kekurangan)' : '(kelebihan)'}</td></tr>
        </tbody>
      </table>

      <h2>Beban Kerja per Divisi PIC</h2>
      <table>
        <thead><tr><th>Divisi / PIC</th><th style="text-align:center">Jumlah Kasus</th><th style="text-align:center">Beban Kerja (Jam)</th><th style="text-align:center">Jam Efektif/Orang</th><th style="text-align:center">Aktual Staf</th><th style="text-align:center">FTE Divisi</th><th style="text-align:center">Status Efektivitas</th></tr></thead>
        <tbody>
          ${(() => {
            const catStd = { 'Plumbing/Air':2,'Listrik/Token':1,'Teknis Unit':2,'Fasilitas Umum':1,'Kebersihan':0.5,'Keamanan/Kejadian':1,'Administrasi/Kartu Akses':0.5,'Renovasi/Izin Pekerjaan':1 };
            return ['Teknisi','Tenant Relation','Housekeeping','Security'].map(div => {
              const cfg = (state.divConfig || {})[div] || { hariKerja:250,jamPerHari:8,allowance:0.10,aktual:5,efektif:2121.6 };
              const kasusDiv = state.complaints.filter(x => x.pic.trim() === div);
              let beban = 0; kasusDiv.forEach(k => { beban += catStd[k.category] || state.fte.standardTime; });
              const fte = cfg.efektif > 0 ? beban / cfg.efektif : 0;
              const efektif = fte <= cfg.aktual;
              return `<tr><td>${div}</td><td style="text-align:center">${kasusDiv.length}</td><td style="text-align:center">${beban.toFixed(1)}</td><td style="text-align:center">${cfg.efektif.toLocaleString('id-ID')}</td><td style="text-align:center">${cfg.aktual}</td><td style="text-align:center">${fte.toFixed(4)}</td><td style="text-align:center;color:${efektif?'#166534':'#991b1b'};font-weight:700;">${efektif?'✓ Efektif':'✗ Belum Efektif'}</td></tr>`;
            }).join('');
          })()}
        </tbody>
      </table>

      <h2>Rekomendasi</h2>
      <table>
        <thead><tr><th>Aspek</th><th>Kondisi Saat Ini</th><th>Rekomendasi</th></tr></thead>
        <tbody>
          <tr><td>Kebutuhan Staff</td><td>FTE ${m.fte.toFixed(4)} ≤ ${m.currentStaff} aktual: ${m.fte <= m.currentStaff ? '✓ Memenuhi' : '✗ Defisit'}</td><td>${m.rec > 0 ? 'Tambah ' + m.rec + ' staf' : 'Kapasitas sudah cukup'}</td></tr>
          <tr><td>Utilisasi</td><td>${m.utilization.toFixed(1)}%</td><td>${m.utilization > 100 ? 'Segera rekrut staf tambahan' : m.utilization < 80 ? 'Pertimbangkan redistribusi tugas' : 'Pertahankan kapasitas saat ini'}</td></tr>
          <tr><td>Standard Handling Time</td><td>${state.fte.standardTime} jam/kasus</td><td>Evaluasi ulang jika beban meningkat &gt; 20%</td></tr>
        </tbody>
      </table>

      <div class="note">
        <strong>Catatan Evaluasi:</strong> Berdasarkan ${m.total} kasus, total beban kerja adalah <strong>${m.workload.toFixed(1)} jam</strong>. 
        Dibutuhkan <strong>${m.fte.toFixed(4)} FTE</strong> vs staf aktual <strong>${m.currentStaff} orang</strong> — 
        ${m.fte <= m.currentStaff ? '<strong style="color:#166534;">✓ FTE ≤ Staf Aktual — kapasitas memenuhi kebutuhan.</strong>' : '<strong style="color:#991b1b;">⚠ FTE TIDAK SESUAI: FTE (' + m.fte.toFixed(4) + ') melebihi staf aktual (' + m.currentStaff + ' orang). Direkomendasikan penambahan ' + m.rec + ' staf.</strong>'}
        ${m.utilization < 80 ? '<br><span style="color:#991b1b;">⚠ Utilisasi workforce (' + m.utilization.toFixed(1) + '%) di bawah optimal (80%). Pertimbangkan redistribusi tugas.</span>' : ''}
        ${m.utilization > 100 ? '<br><span style="color:#991b1b;">⚠ Utilisasi workforce (' + m.utilization.toFixed(1) + '%) melebihi kapasitas (>100%). Rekrut segera.</span>' : ''}
      </div>
    `;
  }

  return `<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Laporan ${label} — Menara Swasana</title>
  ${sharedStyle}
</head>
<body>
  ${body}
  <div class="footer">
    <span>Menara Swasana Management System</span>
    <span>Digenerate: ${now}</span>
  </div>
  <script>window.onload = function() { window.print(); }<\/script>
</body>
</html>`;
}

function triggerPrint(type) {
  const html = buildPrintHTML(type);
  const win  = window.open('', '_blank', 'width=900,height=700');
  if (!win) { toast('Pop-up diblokir browser. Izinkan pop-up untuk mencetak.'); return; }
  win.document.open();
  win.document.write(html);
  win.document.close();
}

  const wb = XLSX.utils.book_new();

  if (type === 'kpi') {
    // Sheet 1: Ringkasan KPI

      ['LAPORAN KPI MENARA SWASANA', '', '', ''],

      ['', '', '', ''],
      ['PERSPEKTIF', 'INDIKATOR KPI', 'FORMULASI / NILAI AKTUAL', 'TARGET'],
      ['Customer', 'Kecepatan Follow-up Komplain', `${s.averageResponse.toFixed(2)} jam rata-rata respon`, '< 30 menit'],
      ['Internal Process', 'Rata-rata Response Time', `${s.averageResponse.toFixed(2)} jam`, 'High < 0.5j, Med < 1j'],
      ['Internal Process', 'Rata-rata Resolution Time', `${s.averageResolution.toFixed(2)} jam`, 'High < 24j, Med < 72j'],

      ['Internal Process', 'Tingkat Penyelesaian Kasus', `${pct(m.kpi)}`, '> 85%'],
      ['Financial', 'Efisiensi FTE', `${m.utilization.toFixed(1)}% utilisasi`, '80-100%'],
      ['Learning & Growth', 'Kapasitas Workforce', `FTE ${m.fte.toFixed(2)} vs ${m.currentStaff} staf aktual (${m.fte <= m.currentStaff ? 'Tercapai' : 'Belum Tercapai'})`, 'FTE ≤ Staf Aktual'],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(kpiData), 'KPI Report');

  } else if (type === 'sla') {
    // Sheet 1: Summary SLA
    const slaSum = [
      ['LAPORAN ANALISIS SLA MENARA SWASANA', '', ''],
      ['Tanggal Laporan:', now, ''],
      ['', '', ''],
      ['METRIK', 'NILAI AKTUAL', 'TARGET'],
      ['Rata-rata Response Time', `${s.averageResponse.toFixed(2)} jam`, 'High < 0.5j, Med < 1j, Low < 2j'],
      ['Rata-rata Resolution Time', `${s.averageResolution.toFixed(2)} jam`, 'High < 24j, Med < 72j, Low < 120j'],
      ['Kepatuhan SLA (Compliance)', `${pct(s.compliance)}`, '> 90%'],
      ['Kasus Patuh SLA', s.compliant, ''],
      ['Kasus Melanggar SLA', s.non, ''],
      ['Total Kasus', state.complaints.length, ''],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(slaSum), 'Ringkasan SLA');

    // Sheet 2: Data per kasus
    const slaDetail = [
      ['ID Komplain', 'Tanggal Masuk', 'Kategori', 'Prioritas', 'Status', 'PIC', 'Response Time (jam)', 'Resolution Time (jam)', 'Patuh SLA?']
    ];
    s.rows.forEach(x => {
      slaDetail.push([
        x.id,
        new Date(x.entered).toLocaleString('id-ID'),
        x.category,
        x.priority,
        x.status,
        x.pic,
        x.rt  != null ? x.rt.toFixed(2)  : '-',
        x.res != null ? x.res.toFixed(2) : '-',
        x.ok ? 'YA' : 'TIDAK'
      ]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(slaDetail), 'Detail SLA per Kasus');

  } else if (type === 'fte') {
    // Sheet 1: FTE Summary
    const fteData = [
      ['LAPORAN ANALISIS FTE MENARA SWASANA', '', ''],
      ['Tanggal Laporan:', now, ''],
      ['', '', ''],
      ['PARAMETER', 'NILAI', 'KETERANGAN'],
      ['Total Komplain', m.total, 'Semua komplain terdaftar'],
      ['Standard Handling Time', `${state.fte.standardTime} jam`, 'Per komplain'],
      ['Total Jam Kerja Terhitung', `${m.workload.toFixed(1)} jam`, 'Total × handling time'],
      ['Jam Kerja Efektif per Staf', `${state.fte.effectiveHours} jam`, 'Per periode'],
      ['FTE Kebutuhan Ideal', m.fte.toFixed(2), 'Beban ÷ jam efektif'],
      ['Staf Aktual Saat Ini', m.currentStaff, 'Orang'],
      ['Gap FTE', m.fteGap.toFixed(2), m.fteGap > 0 ? 'Defisit' : 'Surplus'],
      ['Utilisasi Workforce', `${m.utilization.toFixed(1)}%`, m.utilization > 100 ? 'OVERLOAD' : m.utilization < 80 ? 'UNDERLOAD' : 'OPTIMAL'],
      ['Rekomendasi', m.rec > 0 ? `Tambah ${m.rec} staf` : 'Kapasitas Cukup', ''],
      ['', '', ''],
      ['BEBAN PER PIC', 'JUMLAH KOMPLAIN', 'JAM KERJA (Est.)', 'JAM EFEKTIF/ORANG', 'AKTUAL STAF', 'FTE KEBUTUHAN'],
      ['Teknisi',         state.complaints.filter(x => x.pic === 'Teknisi').length,         355, 2121.6, 5,  (355/2121.6).toFixed(4)],
      ['Tenant Relation', state.complaints.filter(x => x.pic === 'Tenant Relation').length, 3,   2527.2, 2,  (3/2527.2).toFixed(4)],
      ['Housekeeping',    state.complaints.filter(x => x.pic === 'Housekeeping').length,    1,   1996.8, 12, (1/1996.8).toFixed(4)],
      ['Security',        state.complaints.filter(x => x.pic === 'Security').length,        1,   3723,   13, (1/3723).toFixed(4)],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(fteData), 'FTE Report');
  }

  const fname = { kpi: 'Laporan_KPI', sla: 'Laporan_SLA', fte: 'Laporan_FTE' }[type];
  XLSX.writeFile(wb, `${fname}_Menara_Swasana_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast(`Laporan ${fname.replace('_',' ')} berhasil diunduh.`);
}

function calcFTEPerDiv() {
  // Hitung FTE per divisi dengan formula lengkap
  // Jam efektif = hari_kerja * jam_per_hari * (1 - allowance)
  const divs = ['Teknisi','Tenant Relation','Housekeeping','Security'];
  return divs.map(div => {
    const cfg = (state.divConfig || {})[div] || { hariKerja: 250, jamPerHari: 8, allowance: 0.10, aktual: 5, efektif: 2121.6 };
    // Beban per divisi: jumlah kasus * standar handling time per kategori
    const kasusDiv = state.complaints.filter(x => x.pic.trim() === div);
    let beban = 0;
    kasusDiv.forEach(k => {
      // Pakai waktu standar per kategori jika ada, fallback ke global
      const catStd = {
        'Plumbing/Air': 2, 'Listrik/Token': 1, 'Teknis Unit': 2, 'Fasilitas Umum': 1,
        'Kebersihan': 0.5, 'Keamanan/Kejadian': 1, 'Administrasi/Kartu Akses': 0.5, 'Renovasi/Izin Pekerjaan': 1
      };
      beban += catStd[k.category] || state.fte.standardTime;
    });
    const jamEfektifHitung = cfg.hariKerja * cfg.jamPerHari * (1 - cfg.allowance);
    // Gunakan efektif dari data skripsi (sudah include faktor-faktor lain)
    const jamEfektif = cfg.efektif;
    const fte = jamEfektif > 0 ? beban / jamEfektif : 0;
    const utilisasi = cfg.aktual > 0 ? (fte / cfg.aktual) * 100 : 0;
    const efektif = fte <= cfg.aktual; // sudah efektif = FTE tidak melebihi aktual
    return { div, cfg, kasusDiv: kasusDiv.length, beban, jamEfektifHitung, jamEfektif, fte, utilisasi, efektif };
  });
}

      </div>
      <div class="p-6 bg-graphite border border-twilight rounded-[10px] text-[14px] leading-relaxed text-ash">
        <strong class="text-carbon font-bold">Catatan Evaluasi:</strong>

        <strong class="text-carbon">${s.averageResolution.toFixed(1)} jam</strong>.
        Indeks beban FTE <strong class="text-carbon">${m.fte.toFixed(4)}</strong> ≤ staf aktual
        <strong class="text-carbon">${m.currentStaff} orang</strong> — ${m.fte <= m.currentStaff ? '<span class="text-iris">✓ memenuhi target.</span>' : '<span class="text-ash">✗ perlu tambah ' + m.rec + ' staf.</span>'}

            : '';
        })()}
      </div>
    </div>
  </section>`;
}

function toast(msg) {
  const wrap = document.getElementById('toastWrap');
  if (!wrap) return;
  const id = 't' + Date.now();
  wrap.insertAdjacentHTML('beforeend', `
    <div id="${id}" class="bg-graphite border border-twilight shadow-video rounded-[10px] px-6 py-4 flex items-center gap-4 text-[14px] text-carbon transition-all duration-300">
      <span class="w-2 h-2 rounded-full bg-iris animate-pulse"></span>
      <span class="font-mono">${msg}</span>
    </div>
  `);
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) { el.classList.add('opacity-0','translate-y-2'); setTimeout(() => el.remove(), 300); }
  }, 3000);
}

// ============================================================
// Chart rendering — pakai requestAnimationFrame agar canvas siap
// ============================================================
function destroyCharts() {
  for (const k in charts) { try { charts[k].destroy(); } catch(e){} }
  charts = {};
}

const CP = {
  iris: '#6199f6', carbon: '#fcfcfc', smoke: '#757580', ash: '#a3a3b3',
  twilight: '#4f4f80', charcoal: '#2a2a32', void: '#040407',
  green: '#10b981', red: '#f43f5e', amber: '#f59e0b'
};

function renderCharts() {
  destroyCharts();

  // Gunakan rAF agar canvas sudah selesai dirender di DOM
  requestAnimationFrame(() => {
    const m = metrics();
    const s = calcSLA();
    const qSLA = calcSLAByQuarter();

    const baseOpts = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: CP.ash, font: { family: 'Space Mono', size: 10 } } } },
      scales: {
        x: { ticks: { color: CP.smoke, font: { family: 'Inter', size: 11 } }, grid: { color: 'rgba(117,117,128,0.08)' } },
        y: { ticks: { color: CP.smoke, font: { family: 'Inter', size: 11 } }, grid: { color: 'rgba(117,117,128,0.08)' } }
      }
    };
    const pieOpts = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: CP.ash, font: { family: 'Space Mono', size: 10 } } } }
    };

    // 1. Monthly Trend
    const c1 = document.getElementById('monthlyTrend');
    if (c1) {
      const monthlyCounts = [...Array(12)].map((_, i) =>
        state.complaints.filter(x => new Date(x.entered).getMonth() === i).length
      );
      charts['monthlyTrend'] = new Chart(c1, {
        type: 'line',
        data: {
          labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
          datasets: [{
            label: 'Total Kasus Masuk',
            data: monthlyCounts,
            borderColor: CP.iris,
            backgroundColor: 'rgba(97,153,246,0.08)',
            fill: true, tension: 0.35, borderWidth: 2,
            pointBackgroundColor: CP.iris, pointRadius: 4
          }]
        },
        options: baseOpts
      });
    }

    // 2. Category Doughnut — exact match kategori
    const c2 = document.getElementById('categoryPie');
    if (c2) {
      const byCat = categories.map(cat =>
        state.complaints.filter(x => x.category.trim() === cat).length
      );
      const shortLabels = ['Plumbing', 'Listrik', 'Teknis Unit', 'Fas. Umum', 'Kebersihan', 'Keamanan', 'Administrasi', 'Renovasi'];
      charts['categoryPie'] = new Chart(c2, {
        type: 'doughnut',
        data: {
          labels: shortLabels,
          datasets: [{
            data: byCat,
            backgroundColor: [CP.iris, '#818cf8', CP.ash, CP.smoke, CP.twilight, '#6b7280', '#374151', CP.amber],
            borderWidth: 2,
            borderColor: '#08080c'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '55%',
          plugins: {
            legend: {
              position: 'right',
              labels: { color: CP.ash, font: { family: 'Inter', size: 9 }, boxWidth: 10, padding: 6 }
            },
            tooltip: { callbacks: {
              label: ctx => ` ${categories[ctx.dataIndex]}: ${ctx.parsed} kasus`
            }}
          }
        }
      });
    }

    // 3. Workload Stack per PIC — horizontal bar
    const c3 = document.getElementById('workloadStack');
    if (c3) {
      const pics = ['Teknisi', 'Housekeeping', 'Security', 'Tenant Relation'];
      const resolvedLoads = pics.map(p =>
        parseFloat((state.complaints.filter(x => x.pic.trim() === p && x.status === 'Done').length * state.fte.standardTime).toFixed(1))
      );
      const activeLoads = pics.map(p =>
        parseFloat((state.complaints.filter(x => x.pic.trim() === p && x.status === 'On Progress').length * state.fte.standardTime).toFixed(1))
      );
      const pendingLoads = pics.map(p =>
        parseFloat((state.complaints.filter(x => x.pic.trim() === p && x.status === 'Pending').length * state.fte.standardTime).toFixed(1))
      );
      charts['workloadStack'] = new Chart(c3, {
        type: 'bar',
        data: {
          labels: pics,
          datasets: [
            { label: 'Selesai (jam)', data: resolvedLoads, backgroundColor: CP.green,   borderRadius: 3 },
            { label: 'On Progress (jam)', data: activeLoads,  backgroundColor: CP.iris,    borderRadius: 3 },
            { label: 'Pending (jam)',  data: pendingLoads, backgroundColor: CP.amber,   borderRadius: 3 },
          ]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: CP.ash, font: { family: 'Space Mono', size: 10 } } },
            tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.x} jam` } }
          },
          scales: {
            x: {
              stacked: true,
              grid: { color: 'rgba(117,117,128,0.08)' },
              ticks: { color: CP.smoke, font: { family: 'Inter', size: 11 }, callback: v => v + ' j' }
            },
            y: {
              stacked: true,
              grid: { display: false },
              ticks: { color: CP.ash, font: { family: 'Inter', size: 12 } }
            }
          }
        }
      });
    }

    // 4. SLA Gauge (doughnut) — nilai dari kalkulasi nyata
    const c4 = document.getElementById('slaGauge');
    if (c4) {
      charts['slaGauge'] = new Chart(c4, {
        type: 'doughnut',
        data: {
          labels: [`Patuh SLA (${s.compliant})`, `Melanggar SLA (${s.non})`],
          datasets: [{
            data: [s.compliant, s.non],
            backgroundColor: [CP.carbon, '#2a2a32'],
            borderWidth: 2, borderColor: CP.void
          }]
        },
        options: {
          ...pieOpts,
          cutout: '70%',
          plugins: {
            ...pieOpts.plugins,
            tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed} kasus` }}
          }
        }
      });
    }

    // 5. SLA Trend per kuartal — data nyata dari calcSLAByQuarter()
    const c5 = document.getElementById('slaTrend');
    if (c5) {
      charts['slaTrend'] = new Chart(c5, {
        type: 'line',
        data: {
          labels: ['Q1 (Jan–Mar)', 'Q2 (Apr–Jun)', 'Q3 (Jul–Sep)', 'Q4 (Okt–Des)'],
          datasets: [{
            label: 'Kepatuhan SLA (%)',
            data: qSLA,
            borderColor: CP.carbon,
            backgroundColor: 'rgba(252,252,252,0.08)',
            fill: true, tension: 0.3, borderWidth: 2,
            pointBackgroundColor: CP.carbon, pointRadius: 5
          }]
        },
        options: {
          ...baseOpts,
          scales: {
            ...baseOpts.scales,
            y: {
              ...baseOpts.scales.y,
              min: 0, max: 100,
              ticks: { ...baseOpts.scales.y.ticks, callback: v => v + '%' }
            }
          }
        }
      });
    }

    // 6. FTE Gauge (doughnut) — kapasitas vs beban
    const c6 = document.getElementById('fteGauge');
    if (c6) {
      const isOver = m.fte > m.currentStaff;
      const display = isOver
        ? { labels: [`Kapasitas Staf (${m.currentStaff})`, `Defisit (${m.fteGap.toFixed(2)})`], colors: [CP.iris, CP.red] }
        : { labels: [`Beban FTE (${m.fte.toFixed(2)})`, `Kapasitas Idle (${(m.currentStaff - m.fte).toFixed(2)})`], colors: [CP.iris, CP.charcoal] };
      charts['fteGauge'] = new Chart(c6, {
        type: 'doughnut',
        data: {
          labels: display.labels,
          datasets: [{
            data: isOver
              ? [m.currentStaff, m.fteGap]
              : [m.fte, m.currentStaff - m.fte],
            backgroundColor: display.colors,
            borderWidth: 2, borderColor: CP.void
          }]
        },
        options: { ...pieOpts, cutout: '70%' }
      });
    }
  });
}

// ============================================================
// Render
// ============================================================
function render() {
  const user = sessionUser();
  const activeId     = document.activeElement ? document.activeElement.id : null;
  const selStart     = document.activeElement ? document.activeElement.selectionStart : null;
  const selEnd       = document.activeElement ? document.activeElement.selectionEnd   : null;

  const pages = { dashboard: dashboardView, complaints: complaintsView, kpi: kpiView, sla: slaView, fte: fteView, report: reportView };
  const content = (pages[ui.page] || dashboardView)();
  const html = !user ? loginView() : shell(content);
  document.getElementById('app').innerHTML = html;

  if (user) {
    renderCharts();
    bindApp();
    if (activeId) {
      const el = document.getElementById(activeId);
      if (el) {
        el.focus();
        if (selStart !== null && typeof el.setSelectionRange === 'function')
          el.setSelectionRange(selStart, selEnd);
      }
    }
  } else {
    bindLogin();
  }
}

function bindLogin() {
  document.getElementById('togglePwd')?.addEventListener('click', () => {
    const p = document.getElementById('pwd');
    p.type = p.type === 'password' ? 'text' : 'password';
  });
  document.getElementById('loginForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const f = new FormData(e.target);
    if (f.get('email') === 'admin@gmail.com' && f.get('password') === '123') {
      localStorage.setItem(LS.session, JSON.stringify({ email: f.get('email') }));
      toast('Login berhasil!');
      render();
    } else {
      const el = document.getElementById('loginMsg');
      if (el) el.textContent = 'Email atau Password salah';
    }
  });
}

function triggerConfirm(title, message, onOk) {
  ui.confirmModal = { title, message, action: () => { onOk(); ui.confirmModal = null; render(); } };
  render();
}

function bindApp() {
  document.getElementById('mobileMenuBtn')?.addEventListener('click', () => { ui.mobileMenuOpen = true; render(); });
  document.getElementById('closeMobileMenu')?.addEventListener('click', () => { ui.mobileMenuOpen = false; render(); });
  document.getElementById('mobileDrawerBackdrop')?.addEventListener('click', e => {
    if (e.target.id === 'mobileDrawerBackdrop') { ui.mobileMenuOpen = false; render(); }
  });

  document.getElementById('resetDataBtn')?.addEventListener('click', () => {
    if (confirm('Reset semua data ke sample awal? Data yang sudah diinput akan hilang.')) {
      localStorage.removeItem(LS.complaints);
      localStorage.removeItem(LS.fte);
      localStorage.removeItem('kpi_div_config_v1');
      localStorage.removeItem('kpi_survey_v1');
      state = loadState();
      toast('Data direset ke sample awal.');
      render();
    }
  });

  document.querySelectorAll('[data-nav]').forEach(b => b.addEventListener('click', () => {
    ui.mobileMenuOpen = false;
    if (b.dataset.nav === 'logout') { localStorage.removeItem(LS.session); render(); return; }
    ui.page = b.dataset.nav; render();
  }));

  document.querySelectorAll('[data-filter]').forEach(b => b.addEventListener('click', () => { ui.filter = b.dataset.filter; render(); }));

  document.querySelectorAll('[data-action]').forEach(b => b.addEventListener('click', () => {
    if (b.dataset.action === 'add')    { ui.modal = modalForm(); render(); }
    if (b.dataset.action === 'import') { ui.importModal = true; render(); }
  }));

  // Export raw data
  document.getElementById('exportExcelBtn')?.addEventListener('click', () => {
    try {
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.complaints), 'Data');
      XLSX.writeFile(wb, 'database_komplain_swasana.xlsx');
      toast('Berkas ekspor berhasil disusun.');
    } catch (e) { toast('Kegagalan proses ekspor.'); }
  });

  // Report PDF print — kirim type (kpi/sla/fte) ke triggerPrint
  document.querySelectorAll('[data-print-report]').forEach(b => b.addEventListener('click', () => {
    triggerPrint(b.dataset.printReport);
  }));

  // Report Excel export (KPI / SLA / FTE)
  document.querySelectorAll('[data-export-report]').forEach(b => b.addEventListener('click', () => {
    exportReportExcel(b.dataset.exportReport);
  }));

  document.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => {
    ui.modal = modalForm(state.complaints.find(x => x.id === b.dataset.edit)); render();
  }));

  document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => {
    triggerConfirm(
      'Hapus Rekam Komplain',
      `Yakin menghapus ${b.dataset.del}? Tindakan ini permanen.`,
      () => { state.complaints = state.complaints.filter(x => x.id !== b.dataset.del); persist(); toast(`Entri ${b.dataset.del} dihapus.`); }
    );
  }));

  document.getElementById('searchBox')?.addEventListener('input', e => { ui.q = e.target.value; render(); });
  document.getElementById('sortBox')?.addEventListener('change', e => { ui.sort = e.target.value; render(); });

  document.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', () => { ui.modal = null; render(); }));
  document.getElementById('closeImportModal')?.addEventListener('click', () => { ui.importModal = false; render(); });

  document.getElementById('complaintForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const f = new FormData(e.target);
    const item = {
      id:        f.get('id2'),
      entered:   f.get('entered'),
      responded: f.get('responded') || '',
      completed: f.get('completed') || '',
      category:  f.get('category'),
      priority:  f.get('priority'),
      status:    f.get('status'),
      pic:       f.get('pic') || 'Teknisi'
    };
    const ix = state.complaints.findIndex(x => x.id === f.get('id'));
    if (ix >= 0) state.complaints[ix] = item; else state.complaints.unshift(item);
    ui.modal = null; persist(); toast('Data sudah di ubah');
  });

  document.getElementById('catSelect')?.addEventListener('change', e => {
    const el = document.getElementById('picInput');
    if (el) el.value = picMap[e.target.value] || 'Tenant Relation';
  });

  // Survey score inline edit — save on change
  document.querySelectorAll('[data-survey-key]').forEach(inp => {
    inp.addEventListener('change', () => {
      const key = inp.dataset.surveyKey;
      const val = parseFloat(inp.value);
      if (!state.surveyScores) state.surveyScores = {};
      state.surveyScores[key] = isNaN(val) ? null : val;
      persist();
      toast('Skor survey diperbarui.');
    });
  });

  document.getElementById('saveFteBtn')?.addEventListener('click', () => {
    state.fte.standardTime      = parseFloat(document.getElementById('st').value) || 1.5;
    state.fte.effectiveHours    = parseFloat(document.getElementById('ew').value) || 2000;
    state.fte.currentWorkforce  = parseFloat(document.getElementById('cw').value) || 15;
    persist(); toast('Parameter FTE diperbarui.');
  });

  document.getElementById('saveDivCfgBtn')?.addEventListener('click', () => {
    document.querySelectorAll('[data-divcfg]').forEach(inp => {
      const div   = inp.dataset.divcfg;
      const field = inp.dataset.field;
      const val   = parseFloat(inp.value);
      if (!state.divConfig[div]) state.divConfig[div] = {};
      if (field === 'allowancePct') state.divConfig[div].allowance = val / 100;
      else state.divConfig[div][field] = val;
    });
    persist(); toast('Parameter divisi diperbarui.');
  });

  document.getElementById('okConfirmBtn')?.addEventListener('click', () => ui.confirmModal?.action());
  document.getElementById('cancelConfirmBtn')?.addEventListener('click', () => { ui.confirmModal = null; render(); });

  const dropArea = document.getElementById('dropArea');
  if (dropArea) {
    const fi = document.getElementById('importFileInput');
    dropArea.addEventListener('click', () => fi.click());
    fi.addEventListener('change', e => { if (e.target.files[0]) handleImportFile(e.target.files[0]); });
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('border-iris'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('border-iris'));
    dropArea.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]) handleImportFile(e.dataTransfer.files[0]); });
  }
}

function detectImportFormat(rows) {
  // Deteksi format berkas: SLA atau FTE atau umum
  const keys = rows.length ? Object.keys(rows[0]).map(k => k.toLowerCase()) : [];
  const hasSLA = keys.some(k => k.includes('tanggal komplain masuk') || k.includes('status sla') || k.includes('response time aktual'));
  const hasFTE = keys.some(k => k.includes('waktu standar') || k.includes('beban kerja') || k.includes('jumlah komplain') && k.includes('kategori'));
  return hasSLA ? 'sla' : hasFTE ? 'fte' : 'generic';
}

function parseSLArow(r, i) {
  // Kolom DATA_SLA: Tanggal Komplain Masuk, Jam Komplain Masuk, Tanggal Respons Awal, Jam Respons Awal,
  //                 Tanggal Komplain Selesai, Jam Komplain Selesai, Kategori Komplain, Tingkat Urgensi,
  //                 Divisi/PIC, Status SLA Akhir
  function makeISO(tanggal, jam) {
    if (!tanggal) return null;
    let d;
    if (tanggal instanceof Date) d = new Date(tanggal);
    else d = new Date(tanggal);
    if (isNaN(d)) return null;
    // jam bisa string "08:30"
    if (jam && typeof jam === 'string' && jam.includes(':')) {
      const [h, m] = jam.split(':').map(Number);
      d.setHours(h || 0, m || 0, 0, 0);
    }
    return d.toISOString();
  }

  const urg = (r['Tingkat Urgensi'] || '').toLowerCase();
  const priority = urg === 'tinggi' ? 'High' : urg === 'sedang' ? 'Medium' : 'Low';

  const slaStatus = r['Status SLA Akhir'] || '';
  const status = slaStatus.toLowerCase().includes('sesuai') ? 'Done' : 'On Progress';

  const cat = r['Kategori Komplain'] || 'Fasilitas Umum';
  const picRaw = r['Divisi/PIC'] || '';
  let pic = 'Teknisi';
  if (picRaw.toLowerCase().includes('housekeeping')) pic = 'Housekeeping';
  else if (picRaw.toLowerCase().includes('security')) pic = 'Security';
  else if (picRaw.toLowerCase().includes('tenant')) pic = 'Tenant Relation';
  else if (picRaw.toLowerCase().includes('teknisi')) pic = 'Teknisi';
  else pic = picMap[cat] || 'Teknisi';

  const entered   = makeISO(r['Tanggal Komplain Masuk'], r['Jam Komplain Masuk']) || new Date().toISOString();
  const responded = makeISO(r['Tanggal Respons Awal'], r['Jam Respons Awal']) || '';
  const completed = makeISO(r['Tanggal Komplain Selesai'], r['Jam Komplain Selesai']) || '';

  return {
    id:        `C-SLA-${Math.random().toString(36).slice(2,6).toUpperCase()}-${i}`,
    entered, responded, completed, category: cat, priority, status, pic
  };
}

function handleImportFile(file) {
  const ph = document.getElementById('importPlaceholder');
  if (ph) { ph.textContent = `Sedang memproses ${file.name}...`; ph.className = 'font-mono text-[12px] uppercase tracking-eyebrow text-smoke'; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb   = XLSX.read(e.target.result, { type: 'binary' });
      const rawRows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
      if (!rawRows.length) throw new Error('File kosong');

      const fmt = detectImportFormat(rawRows);
      let updated = [];

      if (fmt === 'sla') {
        // Import dari DATA_SLA_MENARA_SWASANA.xlsx
        updated = rawRows
          .filter(r => r['No'] && r['Tanggal Komplain Masuk'])
          .map((r, i) => parseSLArow(r, i));
      } else if (fmt === 'fte') {
        // Import dari DATA_FTE_MENARA_SWASANA.xlsx — update divConfig, tidak tambah complaints baru
        rawRows.forEach(r => {
          const cat = r['Kategori Komplain'] || '';
          const pic = r['PIC Utama'] || '';
          const waktu = parseFloat(r['Waktu Standar per Komplain (Jam)']) || 0;
          // Update state divConfig standardTime per kategori (simpan di fte.standardTime jika global)
          if (pic && waktu > 0 && state.divConfig && state.divConfig[pic]) {
            // Store per-category standard time
            if (!state.fteStdByCategory) state.fteStdByCategory = {};
            state.fteStdByCategory[cat] = waktu;
          }
        });
        if (ph) {
          ph.textContent = '✓ Data FTE berhasil diperbarui!';
          ph.className = 'font-mono text-[12px] uppercase tracking-eyebrow text-iris';
        }
        setTimeout(() => { ui.importModal = false; persist(); toast('Data FTE kategori diperbarui dari Excel.'); }, 1200);
        return;
      } else {
        // Generic format (kolom lama)
        updated = rawRows.map((r, i) => ({
          id:        r.id || `C-IMP-${Math.random().toString(36).slice(2,6).toUpperCase()}-${i}`,
          entered:   r.entered   ? new Date(r.entered).toISOString()   : new Date().toISOString(),
          responded: r.responded ? new Date(r.responded).toISOString() : '',
          completed: r.completed ? new Date(r.completed).toISOString() : '',
          category:  r.category  || 'Fasilitas Umum',
          priority:  r.priority  || 'Medium',
          status:    r.status    || 'Pending',
          pic:       r.pic       || 'Tenant Relation'
        }));
      }

      if (!updated.length) throw new Error('Tidak ada data valid');

      // Show "Done" indicator
      if (ph) {
        ph.textContent = `✓ Selesai — ${updated.length} data berhasil diimpor`;
        ph.className = 'font-mono text-[12px] uppercase tracking-eyebrow text-iris font-bold';
      }
      state.complaints = [...updated, ...state.complaints];
      setTimeout(() => { persist(); ui.importModal = false; toast(`Import selesai: ${updated.length} data komplain ditambahkan.`); }, 1200);
    } catch (err) {
      if (ph) { ph.textContent = `✗ Gagal: ${err.message}`; ph.className = 'font-mono text-[12px] uppercase tracking-eyebrow text-red-400'; }
      setTimeout(() => { ui.importModal = false; render(); }, 1500);
    }
  };
  reader.readAsBinaryString(file);
}

window.addEventListener('load', render);
</script>
